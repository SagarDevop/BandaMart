<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandaMart — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8faf7;
      color: #191c1b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
      animation: fadeIn 0.5s ease;
    }
    .icon-circle {
      width: 96px; height: 96px;
      border-radius: 24px;
      background: #2d5a27;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 24px; font-weight: 700; color: #154212; margin-bottom: 8px; }
    p { font-size: 16px; color: #42493e; line-height: 1.6; margin-bottom: 24px; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; background: #154212; color: white;
      border: none; border-radius: 9999px; font-size: 16px;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: transform 0.2s;
    }
    .retry-btn:active { transform: scale(0.95); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 48px; height: 48px; color: #9dd090;">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
        <path d="M7.06 7.06A16 16 0 0 1 22 4"></path>
        <path d="M1.66 4.34A16 16 0 0 1 12 2a15.89 15.89 0 0 1 7.26 1.74"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px; flex-shrink: 0;">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
      </svg>
      Try Again
    </button>
  </div>
</body>
</html>
