<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BandaMart — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8faf7;
      color: #191c1b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
      animation: fadeIn 0.5s ease;
    }
    .icon-circle {
      width: 96px; height: 96px;
      border-radius: 24px;
      background: #2d5a27;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .material-symbols-outlined {
      font-size: 48px;
      color: #9dd090;
      font-variation-settings: 'FILL' 1;
    }
    h1 { font-size: 24px; font-weight: 700; color: #154212; margin-bottom: 8px; }
    p { font-size: 16px; color: #42493e; line-height: 1.6; margin-bottom: 24px; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; background: #154212; color: white;
      border: none; border-radius: 9999px; font-size: 16px;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: transform 0.2s;
    }
    .retry-btn:active { transform: scale(0.95); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <span class="material-symbols-outlined">wifi_off</span>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <span class="material-symbols-outlined" style="font-size:20px; font-variation-settings:'FILL' 0">refresh</span>
      Try Again
    </button>
  </div>
</body>
</html>
